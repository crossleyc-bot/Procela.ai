version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 22 || nvm install 22
        - npm ci
    build:
      commands:
        # Amplify exposes env vars at build time only; write the ones the
        # Next.js server runtime needs into .env.production so the /api/demo
        # route can read them at request time.
        - env | grep -E '^(RESEND_API_KEY|DEMO_FROM_EMAIL|DEMO_TO_EMAIL)=' >> .env.production || true
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
